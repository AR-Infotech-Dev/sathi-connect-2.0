<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sathi-Connect</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        color: #102033;
        background: linear-gradient(145deg, #ffffff 0%, #f6fbff 54%, #edf7ff 100%);
        font-family: "Segoe UI", Arial, sans-serif;
        overflow: hidden;
      }

      .splash {
        display: grid;
        justify-items: center;
        gap: 16px;
        width: 100%;
        padding: 30px;
      }

      .logo-frame {
        display: grid;
        place-items: center;
        width: 360px;
        height: 132px;
        border: 1px solid rgba(7, 93, 152, 0.12);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 18px 52px rgba(13, 45, 75, 0.14);
      }

      img {
        width: 324px;
        height: 112px;
        object-fit: contain;
      }

      .caption {
        display: grid;
        justify-items: center;
        gap: 5px;
      }

      .caption strong {
        font-size: 17px;
        letter-spacing: 0;
      }

      .caption span {
        color: rgba(16, 32, 51, 0.66);
        font-size: 13px;
      }

      .bar {
        position: relative;
        width: 230px;
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(7, 93, 152, 0.12);
      }

      .bar::before {
        content: "";
        position: absolute;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #0ea5e9, #105a9d);
        animation: load 1.1s ease-in-out infinite;
      }

      @keyframes load {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>
  <body>
    <main class="splash">
      <div class="logo-frame">
        <img src="../public/assets/sathi-connect-logo-transparent.png" alt="Sathi-Connect">
      </div>
      <div class="caption">
        <strong>Sathi-Connect</strong>
        <span>Preparing SATHI to Tally workspace</span>
      </div>
      <div class="bar" aria-hidden="true"></div>
    </main>
  </body>
</html>
